<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Match</title>
    <!-- Modern Styling Framework (Bootstrap) -->
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar/Header -->
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🌟 VolunteerMatch</a>
        </div>
    </nav>

    <!-- Main Content Hero Section -->
    <div class="container text-center my-5 py-5 bg-white rounded shadow-sm">
        <h1 class="display-4 fw-bold text-primary mb-3">Make an Impact Locally</h1>
        <p class="lead text-muted mb-4">Connecting passionate youth with meaningful local volunteer initiatives.</p>
        
        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <!-- ⚡ THE LINK: This maps directly to your @app.route('/opportunities') in app.py -->
            <a href="{{ url_for('opportunities') }}" class="btn btn-primary btn-lg px-4 me-sm-3 fw-bold shadow">Find Opportunities</a>
            <button class="btn btn-outline-secondary btn-lg px-4 fw-bold">Post an Initiative</button>
        </div>
    </div>

    <!-- Quick Stats Section -->
    <div class="container my-4">
        <div class="row text-center g-3">
            <div class="col-6">
                <div class="p-3 bg-white rounded shadow-sm">
                    <h3 class="fw-bold text-success">50+</h3>
                    <p class="text-muted mb-0">Active Volunteers</p>
                </div>
            </div>
            <div class="col-6">
                <div class="p-3 bg-white rounded shadow-sm">
                    <h3 class="fw-bold text-warning">12+</h3>
                    <p class="text-muted mb-0">Local Initiatives</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
